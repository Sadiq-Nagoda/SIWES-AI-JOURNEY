
{% extends "base.html" %}

{% block title %}Admin Login - {{ arena_name }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div style="font-size: 3rem; color: #1e40af; margin-bottom: 1rem;">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="card-header" style="text-align: center;">Admin Login</h1>
            <p class="text-gray-600">Access the admin dashboard to manage bookings</p>
        </div>

        <form method="POST">
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> Username
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter username"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-key"></i> Password
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary w-full mb-3">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>

            <a href="/" class="btn btn-outline w-full text-center">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </form>
    </div>

    <!-- Demo Credentials -->
    <div class="card bg-yellow-50 border-l-4 border-yellow-600 mt-6">
        <h3 class="font-bold text-lg mb-3">
            <i class="fas fa-info-circle"></i> Demo Credentials
        </h3>
        
        <div class="space-y-2 text-sm">
            <div>
                <p class="font-bold text-gray-700">Username:</p>
                <p class="font-mono bg-white p-2 rounded text-gray-800">admin</p>
            </div>
            <div>
                <p class="font-bold text-gray-700">Password:</p>
                <p class="font-mono bg-white p-2 rounded text-gray-800">admin123</p>
            </div>
        </div>
