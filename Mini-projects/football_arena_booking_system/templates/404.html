
{% extends "base.html" %}

{% block title %}Page Not Found - {{ arena_name }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-12">
    <div style="font-size: 4rem; color: #ef4444; margin-bottom: 1rem;">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    
    <h1 class="text-4xl font-bold text-gray-900 mb-2">404</h1>
    <p class="text-xl text-gray-600 mb-6">Page Not Found</p>

    <a href="/" class="btn btn-primary">

    </a>
</div>
{% endblock %}
