<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAIS — Login · AUSU Academic Intelligence System</title>
  <meta name="description" content="Log in to the AUSU Academic Intelligence System — your intelligent university knowledge assistant.">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page" data-page="login">

  <!-- Background -->
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="auth-brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
          <path d="M6 12v5c3 3 9 3 12 0v-5"/>
        </svg>
      </div>
      <div class="brand-name">AUSU <span>Academic</span></div>
      <div class="brand-name" style="font-size:1.2rem;margin-top:-6px;">Intelligence System</div>
      <div class="brand-sub">AAIS · Version 2.0</div>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-card-title">Welcome back</div>
      <div class="auth-card-sub">Sign in with your student registration number to continue.</div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label class="form-label" for="regNum">Registration Number</label>
          <input
            class="form-input"
            type="text"
            id="regNum"
            placeholder="e.g. AUSU/2021/CS/001"
            autocomplete="off"
            spellcheck="false"
            autofocus
          >
          <div class="error-msg" id="loginError" role="alert">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span></span>
          </div>
        </div>

        <button class="btn btn-primary" type="submit" id="loginBtn">
          <div class="spinner"></div>
          <span class="btn-text">Sign In</span>
        </button>

      </form>
    </div>

    <!-- Footer -->
    <div class="auth-footer">
      New to AAIS? <a href="signup.html">Create an account</a>
    </div>

    <!-- Info strip -->
    <div style="text-align:center;margin-top:28px;font-size:0.72rem;color:var(--text-muted);line-height:1.8;">
      Powered by AI · For AUSU Students & Staff<br>
      <span style="color:var(--border-focus);">For academic information only</span>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
